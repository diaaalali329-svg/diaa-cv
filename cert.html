<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشهادات | ضياء العلي</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f4f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        .header-wrapper {
            text-align: center;
        }
        h1 {
            color: var(--primary);
            margin-bottom: 40px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 15px;
            display: inline-block;
        }
        
        /* تنسيقات شبكة الشهادات */
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        .cert-card {
            background: #fff;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 5px solid var(--accent);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .cert-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .cert-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        .cert-title {
            color: var(--primary);
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .cert-issuer {
            color: #7f8c8d;
            font-size: 0.95em;
        }

        /* تنسيق زر العودة */
        .btn-container {
            text-align: center;
            margin-top: 60px;
        }
        .back-btn {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            padding: 12px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
        .back-btn:hover {
            background-color: var(--primary);
            box-shadow: 0 6px 15px rgba(44, 62, 80, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-wrapper">
            <h1>شهاداتي الأكاديمية والمهنية</h1>
        </div>

        <div class="cert-grid">
            
            <div class="cert-card">
                <div class="cert-icon">🛡️</div>
                <div class="cert-title">شهادة الأمن السيبراني</div>
                <div class="cert-issuer">منصة سطر التعليمية</div>
            </div>

            <div class="cert-card">
                <div class="cert-icon">🐍</div>
                <div class="cert-title">شهادات برمجة Python</div>
                <div class="cert-issuer">منصات: سطر، إدراك، ومعهد المجد</div>
            </div>

            <div class="cert-card">
                <div class="cert-icon">💻</div>
                <div class="cert-title">شهادة GitHub</div>
                <div class="cert-issuer">إدارة المستودعات البرمجية</div>
            </div>

            <div class="cert-card">
                <div class="cert-icon">📊</div>
                <div class="cert-title">شهادة ICDL</div>
                <div class="cert-issuer">الرخصة الدولية لقيادة الحاسوب</div>
            </div>

        </div>

        <div class="btn-container">
            <a href="index.html" class="back-btn">العودة للصفحة الرئيسية</a>
        </div>
    </div>

</body>
</html>
