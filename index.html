<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع الشخصي | ضياء العلي</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f4f9;
            --text: #333;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
        }
        
        /* تنسيق قائمة التنقل */
        nav.navbar { 
            background: var(--primary); 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            padding: 0;
            margin: 0;
        }
        nav a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold; 
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--accent);
        }
        
        /* تنسيق القسم الرئيسي (الترحيب والصورة) */
        section#home { 
            padding: 80px 10%; 
            text-align: center; 
            min-height: 75vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* السحر الهندسي في تنسيق الصورة - تم تحويلها لمربع */
        .profile-pic {
            width: 220px; /* عرض الصورة */
            height: 220px; /* طول الصورة */
            border-radius: 12px; /* هنا التعديل: حواف مربعة ناعمة بدلاً من 50% */
            object-fit: cover; /* يمنع تشوه أبعاد الصورة */
            border: 4px solid var(--accent); /* إطار أزرق أنيق */
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); /* ظل خفيف لإبرازها */
            margin-bottom: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        /* إذا أردت المربع حاداً تماماً بدون أي نعومة في الحواف، يمكنك تغيير border-radius إلى 0px */
        
        .profile-pic:hover {
            transform: scale(1.05); /* تكبير الصورة قليلاً عند تمرير الماوس */
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        }
        
        h1 {
            color: var(--primary);
            font-size: 2.8rem;
            margin: 0 0 15px 0;
        }
        
        p.subtitle {
            font-size: 1.2rem;
            color: #555;
            max-width: 650px;
            line-height: 1.7;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">ضياء العلي</div>
        <ul>
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="cv.html" target="_blank">السيرة الذاتية</a></li>
            <li><a href="projects.html" target="_blank">الأعمال</a></li>
            <li><a href="cert.html" target="_blank">الشهادات</a></li>
        </ul>
    </nav>
    
    <section id="home">
        <img src="picc.png" alt="صورة ضياء العلي" class="profile-pic">
        
        <h1>مرحباً، أنا ضياء العلي</h1>
        <p class="subtitle">مهندس معلوماتية متخصص في أمن المعلومات وتطوير البرمجيات، ومؤسس وكالة "آرت لايف". أدمج بين الحلول البرمجية الذكية والتصميم الرقمي المبتكر.</p>
    </section>

</body>
</html>
